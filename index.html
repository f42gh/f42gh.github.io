<!doctype html>
<html lang="ja">
    <head>
        <meta charset="UTF-8" />
        <title>f42/ew</title>
        <meta name="viewport" content="width=device-width", initial-scale=1.0 />
    </head>
    <body>
	<div>
	<h2 id="name">f42 / ew</h2>
        <h2 id="days">DAY <span id="days-alive"/span></h2>
        <script>
            const birthday = new Date("2006-02-22");
            const today = new Date();

            const diffMs = today - birthday;
            const diffDays = Math.floor(diffMs / (1000 * 60 * 60 * 24));

            document.getElementById("days-alive").textContent = diffDays;
        </script>
	</div>
    <div>
   	<h2>Posts</h2>
    <ul>
        {% for post in site.posts %}
        <li>
        <a href="{{ post.url }}">{{ post.title }}</a>
        <span>{{ post.date | date: "%Y-%m-%d" }}</span>
        </li>
        {% endfor %}
    </ul>
    </div>
    </body>
</html>
